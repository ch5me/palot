name: Build Electron App

on:
  workflow_dispatch:

env:
  BUN_VERSION: "1.3.8"
  NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

jobs:
  build-js:
    name: Build JS
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        run: |
          set -euo pipefail
          curl -fsSL https://bun.sh/install | bash -s -- "bun-v${BUN_VERSION}"
          echo "${HOME}/.bun/bin" >> "${GITHUB_PATH}"

      - name: Configure private registries
        run: |
          set -euo pipefail
          cat > .npmrc <<EOF
          @ch5me:registry=https://npm.ch5.me/
          @chriscode:registry=https://npm.ch5.me/
          //npm.ch5.me/:_authToken=${NPM_TOKEN}
          EOF

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build electron-vite
        run: bun run build
        working-directory: apps/desktop

      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: apps/desktop/out
          retention-days: 1

  package:
    name: Package (${{ matrix.name }})
    needs: [build-js]
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            os: ubuntu-latest
            platform: linux
            eb-flags: "--linux"
          - name: macos-arm64
            os: macos-latest
            platform: mac
            eb-flags: "--mac --arm64"
          - name: macos-x64
            os: macos-15-intel
            platform: mac
            eb-flags: "--mac --x64"
          - name: windows-x64
            os: windows-latest
            platform: win
            eb-flags: "--win"
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        run: |
          set -euo pipefail
          curl -fsSL https://bun.sh/install | bash -s -- "bun-v${BUN_VERSION}"
          echo "${HOME}/.bun/bin" >> "${GITHUB_PATH}"

      - name: Configure private registries
        run: |
          set -euo pipefail
          cat > .npmrc <<EOF
          @ch5me:registry=https://npm.ch5.me/
          @chriscode:registry=https://npm.ch5.me/
          //npm.ch5.me/:_authToken=${NPM_TOKEN}
          EOF

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Download build output
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: apps/desktop/out

      - name: Package Electron app
        run: bun run electron-builder ${{ matrix.eb-flags }} --config electron-builder.yml --publish never
        working-directory: apps/desktop
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload artifacts (Linux)
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: elf-linux
          path: |
            apps/desktop/release/*.AppImage
            apps/desktop/release/*.deb
            apps/desktop/release/*.rpm
          if-no-files-found: error
          retention-days: 7

      - name: Upload artifacts (macOS)
        if: matrix.platform == 'mac'
        uses: actions/upload-artifact@v4
        with:
          name: elf-${{ matrix.name }}
          path: |
            apps/desktop/release/*.dmg
            apps/desktop/release/*.zip
          if-no-files-found: error
          retention-days: 7

      - name: Upload artifacts (Windows)
        if: matrix.platform == 'win'
        uses: actions/upload-artifact@v4
        with:
          name: elf-windows
          path: |
            apps/desktop/release/*.exe
          if-no-files-found: error
          retention-days: 7
