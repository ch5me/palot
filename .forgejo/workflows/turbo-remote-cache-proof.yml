name: turbo-remote-cache-proof

on:
  push:
    branches: [main]
    paths: [".forgejo/workflows/turbo-remote-cache-proof.yml"]
  workflow_dispatch:

env:
  BUN_VERSION: "1.3.8"
  TURBO_API: https://turbo-remote-cache.hassoncs.workers.dev
  TURBO_TEAM: ch5
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_REMOTE_CACHE_SIGNATURE_KEY: ${{ secrets.TURBO_REMOTE_CACHE_SIGNATURE_KEY }}
  NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

jobs:
  prove-remote-cache:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        run: |
          set -euo pipefail
          curl -fsSL https://bun.sh/install | bash -s -- "bun-v${BUN_VERSION}"
          echo "${HOME}/.bun/bin" >> "${GITHUB_PATH}"

      - name: Stub sibling ch5-packages workspaces
        run: |
          set -euo pipefail
          stub() { local dir="$1" name="$2" ver="${3:-0.0.0}"; mkdir -p "$dir"; printf '{"name":"%s","version":"%s","private":true}\n' "$name" "$ver" > "$dir/package.json"; }
          stub "../ch5-packages/packages/firefly/design"                   "@ch5me/firefly-design"             "0.1.3"
          stub "../ch5-packages/packages/workspace/contract"               "@ch5me/workspace"                  "0.1.2"
          stub "../ch5-packages/packages/motion/motion"                    "@ch5me/motion"                     "0.3.1"
          stub "../ch5-packages/packages/effects/contract"                 "@ch5me/effects"                    "0.7.0"
          stub "../ch5-packages/packages/react-native/skia-canvas-init"   "@ch5me/skia-canvas-init"           "0.0.0"
          stub "../ch5-packages/packages/tooling/storybook-rn-init"       "@ch5me/storybook-rn-init"          "0.0.0"
          stub "../ch5-packages/packages/tooling/vitest-react-native-mocks" "@ch5me/vitest-react-native-mocks" "0.0.0"
          stub "../ch5-packages/packages/web/agent-ui-web"                "@ch5me/agent-ui-web"               "0.0.0"
          stub "../ch5-packages/packages/web/ch5-design-web"              "@ch5me/ch5-design-web"             "0.0.0"
          stub "../ch5-packages/packages/web/ch5-ui-web"                  "@ch5me/ch5-ui-web"                 "0.0.0"
          stub "../ch5-packages/packages/web/dag-sparkline"               "@ch5me/dag-sparkline"              "0.0.0"
          stub "../ch5-packages/packages/web/html-react-inspector"        "@ch5me/html-react-inspector"       "0.0.0"
          stub "../ch5-packages/packages/web/react-dev-surface"           "@ch5me/react-dev-surface"          "0.0.0"

      - name: Configure private registries
        run: |
          set -euo pipefail
          cat > .npmrc <<EOF
          @ch5me:registry=https://npm.ch5.me/
          @chriscode:registry=https://npm.ch5.me/
          //npm.ch5.me/:_authToken=${NPM_TOKEN}
          EOF

      - name: Install dependencies
        run: bun install

      - name: Prove remote cache build path
        run: bun x turbo run build --filter=@ch5me/elf-server
