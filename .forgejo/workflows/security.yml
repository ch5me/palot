name: Security

on:
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

env:
  BUN_VERSION: "1.3.8"
  NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

jobs:
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        run: |
          set -euo pipefail
          curl -fsSL https://bun.sh/install | bash -s -- "bun-v${BUN_VERSION}"
          echo "${HOME}/.bun/bin" >> "${GITHUB_PATH}"

      - name: Configure private registries
        run: |
          set -euo pipefail
          cat > .npmrc <<EOF
          @ch5me:registry=https://npm.ch5.me/
          @chriscode:registry=https://npm.ch5.me/
          //npm.ch5.me/:_authToken=${NPM_TOKEN}
          EOF

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Audit high and critical vulnerabilities
        run: bun audit --audit-level high
