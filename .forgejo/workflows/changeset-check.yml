name: Changeset Check

on:
  pull_request:
    branches: [main]

env:
  BUN_VERSION: "1.3.8"
  NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

jobs:
  changeset-check:
    name: Changeset Status
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.actor != 'github-actions[bot]' && github.actor != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Bun
        run: |
          set -euo pipefail
          curl -fsSL https://bun.sh/install | bash -s -- "bun-v${BUN_VERSION}"
          echo "${HOME}/.bun/bin" >> "${GITHUB_PATH}"

      - name: Configure private registries
        run: |
          set -euo pipefail
          cat > .npmrc <<EOF
          @ch5me:registry=https://npm.ch5.me/
          @chriscode:registry=https://npm.ch5.me/
          //npm.ch5.me/:_authToken=${NPM_TOKEN}
          EOF

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check for changeset
        run: |
          set -euo pipefail
          git fetch origin main
          STATUS=$(bunx changeset status --since=origin/main 2>&1) || true
          if echo "$STATUS" | grep -q "No changesets present"; then
            echo "::warning::No changeset found. If this PR includes user-facing changes, run 'bun changeset' and commit the generated file."
          else
            echo "Changeset found:"
            echo "$STATUS"
          fi
