name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  BUN_VERSION: "1.3.8"
  NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

jobs:
  ci:
    name: Lint, Type Check, Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        run: |
          curl -fsSL https://bun.sh/install | bash -s -- "bun-v${BUN_VERSION}"
          echo "${HOME}/.bun/bin" >> "${GITHUB_PATH}"

      - name: Configure private registries
        run: |
          cat > .npmrc <<EOF
          @ch5me:registry=https://npm.ch5.me/
          @chriscode:registry=https://npm.ch5.me/
          //npm.ch5.me/:_authToken=${NPM_TOKEN}
          EOF

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Guard - no elf-ui shim imports
        run: node scripts/check-no-elf-ui-shim-imports.mjs

      - name: Type check
        run: bun run check-types

      - name: Build all packages
        run: bun run build
        env:
          NODE_OPTIONS: --max-old-space-size=3072
