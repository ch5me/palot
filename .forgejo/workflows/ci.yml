name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  BUN_VERSION: "1.3.8"
  NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        run: |
          set -euo pipefail
          curl -fsSL https://bun.sh/install | bash -s -- "bun-v${BUN_VERSION}"
          echo "${HOME}/.bun/bin" >> "${GITHUB_PATH}"

      - name: Configure private registries
        run: |
          set -euo pipefail
          cat > .npmrc <<EOF
          @ch5me:registry=https://npm.ch5.me/
          @chriscode:registry=https://npm.ch5.me/
          //npm.ch5.me/:_authToken=${NPM_TOKEN}
          EOF

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Guard - no elf-ui shim imports
        run: node scripts/check-no-elf-ui-shim-imports.mjs

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        run: |
          set -euo pipefail
          curl -fsSL https://bun.sh/install | bash -s -- "bun-v${BUN_VERSION}"
          echo "${HOME}/.bun/bin" >> "${GITHUB_PATH}"

      - name: Configure private registries
        run: |
          set -euo pipefail
          cat > .npmrc <<EOF
          @ch5me:registry=https://npm.ch5.me/
          @chriscode:registry=https://npm.ch5.me/
          //npm.ch5.me/:_authToken=${NPM_TOKEN}
          EOF

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run check-types

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        run: |
          set -euo pipefail
          curl -fsSL https://bun.sh/install | bash -s -- "bun-v${BUN_VERSION}"
          echo "${HOME}/.bun/bin" >> "${GITHUB_PATH}"

      - name: Configure private registries
        run: |
          set -euo pipefail
          cat > .npmrc <<EOF
          @ch5me:registry=https://npm.ch5.me/
          @chriscode:registry=https://npm.ch5.me/
          //npm.ch5.me/:_authToken=${NPM_TOKEN}
          EOF

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build all packages
        run: bun run build
        env:
          NODE_OPTIONS: --max-old-space-size=3072
