name: turbo-remote-cache-proof
on:
  push:
    branches: [main]
    paths: ['.github/workflows/turbo-remote-cache-proof.yml']
  workflow_dispatch:
env:
  TURBO_API: https://turbo-remote-cache.hassoncs.workers.dev
  TURBO_TEAM: ch5
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_REMOTE_CACHE_SIGNATURE_KEY: ${{ secrets.TURBO_REMOTE_CACHE_SIGNATURE_KEY }}
  NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
jobs:
  prove-remote-cache:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.8'
      - run: bun install --frozen-lockfile
      - run: bun x turbo run build --filter=@ch5me/elf-server
